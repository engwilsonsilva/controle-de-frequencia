<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Frequência</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:8px;
}

select,input{
  padding:8px;
  margin-bottom:10px;
}

.cards{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.card{
  flex:1;
  background:#eee;
  padding:10px;
  border-radius:6px;
  text-align:center;
  cursor:pointer;
}

.card h3{
  margin:0;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid #ddd;
}

.risco{
  color:#d97706;
  font-weight:bold;
}

.desistente{
  color:red;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Controle de Frequência</h2>

<select id="turma"></select>

<div class="cards">
<div class="card" onclick="filtrar('Frequentando')">
<h3 id="c_freq">0</h3>Frequentando
</div>

<div class="card" onclick="filtrar('Risco')">
<h3 id="c_risco">0</h3>Risco
</div>

<div class="card" onclick="filtrar('Possível desistência')">
<h3 id="c_poss">0</h3>Possível desistência
</div>

<div class="card" onclick="filtrar('Desistente')">
<h3 id="c_desist">0</h3>Desistentes
</div>
</div>

<canvas id="grafico"></canvas>

<h3>Ranking de faltas</h3>
<div id="ranking"></div>

<h3>Buscar aluno</h3>
<input id="busca" placeholder="Digite o nome">

<h3>Lista de alunos</h3>

<table>
<thead>
<tr>
<th>Aluno</th>
<th>Faltas</th>
<th>Situação</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<button onclick="window.print()">Imprimir relatório</button>

</div>

<script>

const SHEET_ID="1NBBtdsqbR4FzNyNsCuG3K3HdSRk6QzT-QR2mnjHEXJ0";

let dados=[];
let filtrados=[];
let chart;

function carregarTurmas(){

fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Turmas`)
.then(res=>res.text())
.then(data=>{

const json=JSON.parse(data.substring(47).slice(0,-2));

const rows=json.table.rows;

const select=document.getElementById("turma");

rows.forEach(r=>{

let turma=r.c[0]?.v;

let opt=document.createElement("option");

opt.value=turma;
opt.textContent=turma;

select.appendChild(opt);

});

select.addEventListener("change",()=>carregarDados(select.value));

carregarDados(rows[0].c[0].v);

});

}

function carregarDados(turma){

fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(turma)}`)
.then(res=>res.text())
.then(data=>{

const json=JSON.parse(data.substring(47).slice(0,-2));

const rows=json.table.rows;

dados=[];

rows.forEach(r=>{

if(!r.c[0]) return;

dados.push({

aluno:r.c[0]?.v,
faltas:r.c[1]?.v || 0

});

});

filtrados=[...dados];

mostrar();

});

}

function classificar(f){

if(f<=14) return "Frequentando";
if(f<=30) return "Risco";
if(f<=41) return "Possível desistência";
return "Desistente";

}

function mostrar(){

let freq=0;
let risco=0;
let poss=0;
let desist=0;

const tabela=document.getElementById("tabela");

tabela.innerHTML="";

filtrados.forEach(a=>{

let c=classificar(a.faltas);

if(c==="Frequentando") freq++;
else if(c==="Risco") risco++;
else if(c==="Possível desistência") poss++;
else desist++;

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${a.aluno}</td>
<td>${a.faltas}</td>
<td>${c}</td>
`;

tabela.appendChild(tr);

});

document.getElementById("c_freq").innerText=freq;
document.getElementById("c_risco").innerText=risco;
document.getElementById("c_poss").innerText=poss;
document.getElementById("c_desist").innerText=desist;

if(chart){
chart.destroy();
}

chart=new Chart(document.getElementById("grafico"),{

type:"pie",

data:{
labels:["Frequentando","Risco","Possível desistência","Desistente"],
datasets:[{
data:[freq,risco,poss,desist]
}]
}

});

ranking();

alerta();

}

function ranking(){

let top=[...dados]
.sort((a,b)=>b.faltas-a.faltas)
.slice(0,10);

let html="<ol>";

top.forEach(a=>{
html+=`<li>${a.aluno} — ${a.faltas} faltas</li>`;
});

html+="</ol>";

document.getElementById("ranking").innerHTML=html;

}

function alerta(){

let criticos=dados.filter(a=>a.faltas>=30);

if(criticos.length>0){

console.log("Alunos críticos:",criticos);

}

}

function filtrar(tipo){

filtrados=dados.filter(a=>classificar(a.faltas)===tipo);

mostrar();

}

document.getElementById("busca").addEventListener("input",function(){

let termo=this.value.toLowerCase();

filtrados=dados.filter(a=>a.aluno.toLowerCase().includes(termo));

mostrar();

});

carregarTurmas();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Controle de Frequência</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
}

.chart-box{
max-width:420px;
margin:auto;
}

select{
padding:8px;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

.alerta{
background:#ffe0e0;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

.card{
background:#eee;
padding:12px;
border-radius:6px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Controle de Frequência</h2>

<div id="alertas"></div>

<h3>Painel geral das turmas</h3>

<div id="painelTurmas"></div>

<hr>

<select id="turma"></select>

<div class="chart-box">
<canvas id="grafico"></canvas>
</div>

<h3>Lista de alunos</h3>

<table>

<thead>
<tr>
<th>#</th>
<th>Aluno</th>
<th>Faltas</th>
<th>Situação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script>

const SHEET_ID="1NBBtdsqbR4FzNyNsCuG3K3HdSRk6QzT-QR2mnjHEXJ0";

let dados=[];
let chart;

function classificar(f){

if(f<=14) return "Frequentando";
if(f<=30) return "Risco";
if(f<=41) return "Possível desistência";
return "Desistente";

}

function carregarTurmas(){

fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Turmas`)
.then(res=>res.text())
.then(data=>{

const json=JSON.parse(data.substring(47).slice(0,-2));

const rows=json.table.rows;

const select=document.getElementById("turma");

rows.forEach(r=>{

let turma=r.c[0].v;

let opt=document.createElement("option");

opt.value=turma;
opt.textContent=turma;

select.appendChild(opt);

carregarResumo(turma);

});

select.addEventListener("change",()=>carregarDados(select.value));

carregarDados(rows[0].c[0].v);

});

}

function carregarResumo(turma){

fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(turma)}`)
.then(res=>res.text())
.then(data=>{

const json=JSON.parse(data.substring(47).slice(0,-2));

const rows=json.table.rows;

let freq=0;
let risco=0;
let poss=0;
let desist=0;

rows.forEach(r=>{

let aluno=r.c[0]?.v;
let faltas=r.c[1]?.v;

if(!aluno) return;
if(!faltas && faltas!==0) return;

let c=classificar(faltas);

if(c==="Frequentando")freq++;
else if(c==="Risco")risco++;
else if(c==="Possível desistência")poss++;
else desist++;

});

let div=document.createElement("div");

div.className="card";

div.innerHTML=`
<b>${turma}</b><br>
Frequentando: ${freq}<br>
Risco: ${risco}<br>
Possível desistência: ${poss}<br>
Desistentes: ${desist}
`;

document.getElementById("painelTurmas").appendChild(div);

if(desist>5){

document.getElementById("alertas").innerHTML+=`
<div class="alerta">
⚠ ${turma} possui ${desist} alunos desistentes
</div>
`;

}

});

}

function carregarDados(turma){

fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(turma)}`)
.then(res=>res.text())
.then(data=>{

const json=JSON.parse(data.substring(47).slice(0,-2));

const rows=json.table.rows;

dados=[];

rows.forEach(r=>{

let aluno=r.c[0]?.v;
let faltas=r.c[1]?.v;

if(!aluno) return;
if(!faltas && faltas!==0) return;

dados.push({

aluno:aluno,
faltas:faltas

});

});

mostrar();

});

}

function mostrar(){

let freq=0;
let risco=0;
let poss=0;
let desist=0;

const tabela=document.getElementById("tabela");

tabela.innerHTML="";

dados.forEach((a,i)=>{

let c=classificar(a.faltas);

if(c==="Frequentando")freq++;
else if(c==="Risco")risco++;
else if(c==="Possível desistência")poss++;
else desist++;

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${i+1}</td>
<td>${a.aluno}</td>
<td>${a.faltas}</td>
<td>${c}</td>
`;

tabela.appendChild(tr);

});

if(chart)chart.destroy();

chart=new Chart(document.getElementById("grafico"),{

type:"pie",

data:{
labels:["Frequentando","Risco","Possível desistência","Desistente"],
datasets:[{
data:[freq,risco,poss,desist]
}]
},

options:{
responsive:true,
maintainAspectRatio:false
}

});

}

carregarTurmas();

</script>

</body>
</html>
